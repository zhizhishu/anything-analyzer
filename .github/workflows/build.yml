name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: macos-latest
            platform: mac
            arch: universal
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        env:
          ELECTRON_MIRROR: ""

      - name: Build
        run: pnpm run build

      - name: Package for Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package for macOS
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npx electron-builder --mac --x64 --arm64 --publish never
          grep -q 'arm64\.zip' dist/latest-mac.yml
          grep -q 'x64\.zip' dist/latest-mac.yml

      - name: Verify macOS signing configuration
        if: matrix.platform == 'mac'
        run: |
          test -n "${{ secrets.CSC_LINK }}"
          test -n "${{ secrets.CSC_KEY_PASSWORD }}"
          test -n "${{ secrets.APPLE_ID }}"
          test -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          test -n "${{ secrets.APPLE_TEAM_ID }}"
          codesign --verify --deep --strict --verbose=2 "dist/mac*/Anything Analyzer.app"

      - name: Package for Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout for release notes
        uses: actions/checkout@v4
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.blockmap
